<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayGate Dating - Maintenance</title>
  <meta name="description" content="PayGate Dating is currently undergoing scheduled maintenance. We'll be back shortly.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #1a0a2e 60%, #0d0518 100%);
      color: #f0e6ff;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }

    .bg-glow-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      top: -100px;
      right: -100px;
    }

    .bg-glow-2 {
      width: 300px;
      height: 300px;
      background: #a855f7;
      bottom: -80px;
      left: -80px;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.25);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.1); }
      50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.25); }
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      color: #a78bfa;
    }

    h1 {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      color: #f5f0ff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #c4b5d6;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #b8a5cc;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .progress-bar {
      margin-top: 1rem;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      border-radius: 2px;
      animation: progress-sweep 2.5s ease-in-out infinite;
    }

    @keyframes progress-sweep {
      0% { width: 10%; margin-left: 0; }
      50% { width: 40%; margin-left: 30%; }
      100% { width: 10%; margin-left: 90%; }
    }

    .footer-text {
      font-size: 0.8rem;
      color: #8b7a9e;
    }

    .brand {
      color: #a78bfa;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .subtitle { font-size: 0.95rem; }
      .container { padding: 1.5rem; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085" />
      </svg>
    </div>

    <h1>We're Improving Things</h1>
    <p class="subtitle">
      PayGate Dating is undergoing a quick update to bring you a better experience. We'll be back in just a moment.
    </p>

    <div class="status-card">
      <div class="status-row">
        <span class="status-dot"></span>
        <span>Update in progress</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <p class="footer-text">
      Thank you for your patience. &mdash; <span class="brand">PayGate</span>
    </p>
  </div>
</body>
</html>
